name: Auto-Mint Cron

on:
  schedule:
    # Runs every minute — GitHub Actions minimum is 1 minute
    - cron: '* * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Validate secrets
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL secret is not set. Add it in: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Call auto-mint endpoint
        run: |
          # Disable set -e so curl failure (DNS/network) doesn't kill the step before we can inspect the result.
          # GitHub Actions runs bash with -eo pipefail by default; curl exits non-zero on network errors.
          set +e
          HTTP_STATUS=$(curl -s \
            --output /tmp/response_body.txt \
            --write-out "%{http_code}" \
            --connect-timeout 10 \
            --max-time 55 \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            "${APP_URL}/api/auto-mint")
          CURL_EXIT=$?
          set -e

          echo "curl exit code: $CURL_EXIT"
          echo "HTTP status:    $HTTP_STATUS"

          if [ -s /tmp/response_body.txt ]; then
            echo "Response body:"
            cat /tmp/response_body.txt
          fi

          if [ "$CURL_EXIT" -ne 0 ] || [ "$HTTP_STATUS" = "000" ]; then
            echo "::error::curl failed (exit $CURL_EXIT) — cannot reach ${APP_URL}. Check the APP_URL secret."
            exit 1
          fi

          if [ "$HTTP_STATUS" -ge 500 ]; then
            echo "::error::Auto-mint endpoint returned HTTP $HTTP_STATUS — server error on Vercel."
            exit 1
          fi

          echo "Auto-mint cron completed — HTTP $HTTP_STATUS"
